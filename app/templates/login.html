<!DOCTYPE html>
<html>
<head>
<title>Login — Channel Manager</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
    --navy: #243f62;
    --blue: #5b9bd5;
    --blue-deep: #3a7bbf;
    --blue-pale: #ddeeff;
    --bg: #eef2f7;
    --surface: #ffffff;
    --border: #dce6f0;
    --text: #3a4a5c;
    --muted: #8a9db5;
}

body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
        radial-gradient(ellipse at 40% 30%, rgba(91,155,213,0.14) 0%, transparent 55%),
        radial-gradient(ellipse at 70% 80%, rgba(91,155,213,0.08) 0%, transparent 45%);
}

.login-wrap {
    width: 100%;
    max-width: 400px;
    animation: rise 0.6s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes rise {
    from { opacity: 0; transform: translateY(24px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.brand {
    text-align: center;
    margin-bottom: 24px;
}

.brand-icon {
    width: 54px; height: 54px;
    background: var(--navy);
    border-radius: 16px;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 24px;
    box-shadow: 0 8px 24px rgba(36,63,98,0.25);
    margin-bottom: 12px;
}

.brand h1 {
    font-size: 20px;
    font-weight: 700;
    color: var(--navy);
}

.brand p {
    font-size: 13.5px;
    color: var(--muted);
    font-weight: 500;
    margin-top: 3px;
}

.card {
    background: var(--surface);
    border-radius: 22px;
    padding: 36px 38px 32px;
    border: 1.5px solid var(--border);
    box-shadow: 0 4px 32px rgba(50,80,120,0.1);
}

.field {
    margin-bottom: 18px;
    animation: fadeUp 0.4s ease both;
}
.field:nth-child(1) { animation-delay: 0.2s; }
.field:nth-child(2) { animation-delay: 0.28s; }
.field:nth-child(3) { animation-delay: 0.36s; }

@keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
}

label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 7px;
}

input[type="email"],
input[type="password"],
input[type="text"] {
    width: 100%;
    padding: 13px 16px;
    border: 1.5px solid var(--border);
    border-radius: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 14.5px;
    font-weight: 500;
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    appearance: none;
    -webkit-appearance: none;
}

input:focus {
    border-color: var(--blue);
    background: white;
    box-shadow: 0 0 0 3.5px rgba(91,155,213,0.18);
}

input::placeholder {
    color: #b8c8d8;
    font-weight: 400;
}

/* Password wrapper */
.password-wrap {
    position: relative;
}

.password-wrap input {
    padding-right: 46px;
}

/* Toggle — fully self-contained, zero inheritance from other button rules */
.toggle-pw {
    all: unset;
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 26px;
    height: 26px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: color 0.15s;
}
.toggle-pw:hover { color: var(--navy); }

/* Submit button — class scoped so it never touches the toggle */
.btn-signin {
    width: 100%;
    padding: 14px;
    background: var(--navy);
    color: white;
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 6px;
    transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(36,63,98,0.22);
    display: block;
}

.btn-signin:hover {
    background: var(--blue-deep);
    box-shadow: 0 6px 20px rgba(58,123,191,0.32);
    transform: translateY(-1px);
}

.btn-signin:active { transform: translateY(0); }

.footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12.5px;
    color: var(--muted);
    font-weight: 500;
}

@media (max-width: 480px) {
    .card { padding: 28px 22px 24px; border-radius: 18px; }
    .brand-icon { width: 46px; height: 46px; font-size: 20px; border-radius: 13px; }
    .brand h1 { font-size: 18px; }
}
</style>
</head>
<body>

<div class="login-wrap">

    <div class="brand">
        <div class="brand-icon">🏡</div>
        <h1>Channel Manager</h1>
        <p>Sign in to your dashboard</p>
    </div>

    <div class="card">
        <form method="POST" action="/login">

            <div class="field">
                <label for="email">Email address</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <div class="password-wrap">
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <button type="button" class="toggle-pw" onclick="togglePassword()" aria-label="Toggle password visibility">
                        <svg id="icon-show" width="18" height="18" viewBox="0 0 18 18" fill="none">
                            <path d="M1 9C1 9 4 3 9 3s8 6 8 6-3 6-8 6-8-6-8-6z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                            <circle cx="9" cy="9" r="2.5" stroke="currentColor" stroke-width="1.5"/>
                        </svg>
                        <svg id="icon-hide" width="18" height="18" viewBox="0 0 18 18" fill="none" style="display:none">
                            <path d="M1 1l16 16M7.5 7.6A2.5 2.5 0 0 0 11.4 11M5 4.1C3.1 5.3 1.8 7 1 9c1.6 3.3 4.9 6 8 6a8.4 8.4 0 0 0 4-1.1M13.4 13C15.1 11.8 16.3 10.1 17 9c-1.6-3.3-4.9-6-8-6a8 8 0 0 0-2.9.6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="field">
                <button type="submit" class="btn-signin">Sign in</button>
            </div>

        </form>
    </div>

    <p class="footer-note">Airbnb · Vrbo · Direct — all in one place</p>

</div>

<script>
function togglePassword() {
    const input    = document.getElementById('password');
    const iconShow = document.getElementById('icon-show');
    const iconHide = document.getElementById('icon-hide');
    const isHidden = input.type === 'password';

    input.type             = isHidden ? 'text' : 'password';
    iconShow.style.display = isHidden ? 'none' : '';
    iconHide.style.display = isHidden ? ''     : 'none';
}
</script>

</body>
</html>
